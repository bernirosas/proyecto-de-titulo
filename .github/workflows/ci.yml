name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancela corridas viejas si llegan commits nuevos al mismo PR / branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint y formato
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias del sistema (ruff + black)
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9 black==24.10.0

      - name: Ruff (linter)
        # Reporta los errores con anotaciones inline en el PR.
        run: ruff check --output-format=github src scripts

      - name: Black (chequeo de formato)
        # --check no modifica nada; --diff muestra qué cambiaría.
        run: black --check --diff src scripts

  test:
    name: Tests unitarios
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias de testing
        # Solo lo necesario para tests unitarios (sin spaCy, NLTK, torch,
        # transformers — esas se stubean en tests/conftest.py).
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Ejecutar pytest
        run: pytest
